# =============================================================
# Nginx — Reverse Proxy for Gaokao Admission Platform
# Routes:
#   /              -> user-web (front-end user SPA)
#   /admin/        -> admin-web (admin back-office SPA)
#   /api/          -> api-gateway (backend API)
#   /api/admin/    -> api-gateway (admin API)
# =============================================================

user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  2048;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;
    client_max_body_size    20m;
    client_body_buffer_size 128k;

    # Gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # -----------------------------------------------------------
    # Upstream definitions
    # -----------------------------------------------------------
    upstream user_web {
        server host.docker.internal:3000;   # user-web dev server
        keepalive 32;
    }

    upstream admin_web {
        server host.docker.internal:3001;   # admin-web dev server
        keepalive 32;
    }

    upstream api_gateway {
        server host.docker.internal:8080;   # Spring Boot API gateway
        keepalive 64;
    }

    # -----------------------------------------------------------
    # HTTP server
    # -----------------------------------------------------------
    server {
        listen       80;
        server_name  localhost;

        # Security headers
        add_header X-Frame-Options         "DENY"            always;
        add_header X-Content-Type-Options  "nosniff"         always;
        add_header X-XSS-Protection        "1; mode=block"   always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # -------------------------------------------------------
        # API Gateway (highest priority — prefix match)
        # -------------------------------------------------------
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header   Host                  $host;
            proxy_set_header   X-Real-IP             $remote_addr;
            proxy_set_header   X-Forwarded-For       $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto     $scheme;
            proxy_set_header   X-Forwarded-Host      $host;
            proxy_set_header   X-Forwarded-Port      $server_port;
            proxy_set_header   Connection            "";

            # Timeouts
            proxy_connect_timeout   10s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;

            # Buffering
            proxy_buffering         off;
            proxy_buffer_size       16k;
            proxy_buffers           8 16k;
            proxy_busy_buffers_size 32k;
        }

        # -------------------------------------------------------
        # Admin Web (SPA)
        # -------------------------------------------------------
        location /admin {
            alias          /usr/share/nginx/html/admin;
            index          index.html;
            try_files      $uri $uri/ /admin/index.html;

            # Cache static assets aggressively
            location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot)$ {
                expires      1y;
                add_header   Cache-Control "public, immutable";
                access_log   off;
            }

            # HTML — never cache
            location ~* \.html$ {
                expires      -1;
                add_header   Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # -------------------------------------------------------
        # User Web (SPA) — default route
        # -------------------------------------------------------
        location / {
            alias          /usr/share/nginx/html/user;
            index          index.html;
            try_files      $uri $uri/ /index.html;

            # Cache static assets aggressively
            location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|svg|woff2?|ttf|eot)$ {
                expires      1y;
                add_header   Cache-Control "public, immutable";
                access_log   off;
            }

            # HTML — never cache
            location ~* \.html$ {
                expires      -1;
                add_header   Cache-Control "no-cache, no-store, must-revalidate";
            }
        }

        # -------------------------------------------------------
        # Health check endpoint
        # -------------------------------------------------------
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # -------------------------------------------------------
        # Deny access to hidden files
        # -------------------------------------------------------
        location ~ /\. {
            deny  all;
            access_log off;
            log_not_found off;
        }
    }
}
