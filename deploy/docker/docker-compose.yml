version: "3.9"

# =============================================================
# Gaokao Admission Platform — Local Development Stack
# =============================================================

services:

  # -----------------------------------------------------------
  # MySQL 8.4 — Primary database
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.4
    container_name: gaokao-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: admission_platform
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=512M
      - --innodb_log_file_size=256M

  # -----------------------------------------------------------
  # Redis 7 — Cache & session store
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: gaokao-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # -----------------------------------------------------------
  # Nginx — Reverse proxy & static file server
  # -----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: gaokao-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # -----------------------------------------------------------
  # Flyway — Database migrations (one-shot, then exits)
  # Uncomment to run migrations on startup:
  # -----------------------------------------------------------
  # flyway:
  #   image: flyway/flyway:10
  #   container_name: gaokao-flyway
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #   volumes:
  #     - ../../database/migrations:/flyway/sql:ro
  #   command:
  #     - -url=jdbc:mysql://mysql:3306/admission_platform?useSSL=false&allowPublicKeyRetrieval=true
  #     - -user=root
  #     - -password=root123
  #     - migrate
  #   restart: "no"

volumes:
  mysql_data:
    name: gaokao_mysql_data
  redis_data:
    name: gaokao_redis_data
  nginx_logs:
    name: gaokao_nginx_logs

networks:
  default:
    name: gaokao-network
    driver: bridge
