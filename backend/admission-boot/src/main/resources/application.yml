server:
  port: 8080

spring:
  application:
    name: admission-service

  profiles:
    active: dev

  # MySQL datasource
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/admission_platform?socketTimeout=120000&useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: admission
    password: admission123
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
      pool-name: AdmissionHikariCP

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 3000ms

  # Flyway DB migration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    table: flyway_schema_history
    encoding: UTF-8
    out-of-order: false
    validate-on-migrate: true

  # Jackson
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # File upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  # Internationalization
  messages:
    encoding: UTF-8
    basename: i18n/messages

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    # default-statement-timeout: 60
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      update-strategy: not_null
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.admission

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /doc.html
    tags-sorter: alpha
    operations-sorter: method
  group-configs:
    - group: all
      paths-to-match: /api/**
      packages-to-scan: com.example.admission

# Resilience4j
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 20
        sliding-window-type: COUNT_BASED
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      predictionService:
        base-config: default
        sliding-window-size: 10
        wait-duration-in-open-state: 60s
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - java.net.SocketTimeoutException
          - java.io.IOException

# Logging
logging:
  level:
    root: INFO
    com.example.admission: DEBUG
    org.springframework.web: INFO
    org.mybatis: DEBUG
    com.baomidou.mybatisplus: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"
  file:
    name: logs/admission.log
    max-size: 100MB
    max-history: 30

# Application specific
app:
  security:
    jwt:
      secret: change-me-to-a-secure-random-secret-at-least-256-bits
      expiration-ms: 7200000   # 2 hours
      refresh-expiration-ms: 604800000  # 7 days
    sms:
      provider: aliyun
      encryption-key:   # AES-256 key for mobile encryption (Base64 encoded). Auto-generated on first startup if empty.
      code-length: 6
      code-expiration-seconds: 300  # 5 minutes
      resend-interval-seconds: 60   # 1 minute
      daily-send-limit: 10          # max SMS per mobile per day
      max-verify-attempts: 3        # max failed verify attempts before code invalidation
      ip-rate-limit-per-minute: 10  # max SMS sends per IP per minute
    session:
      max-concurrent: 3
      timeout: 604800               # 7 days in seconds
      namespace: "admission:session"
      cookie-name: "ADMISSION_SESSION"
  candidate:
    default-volunteer-limit: 96
    # 山东6选3的20种选科组合，索引 0-19
    subject-combos: 物化生,物化政,物化史,物化地,物生政,物生史,物生地,物政史,物政地,物史地,化生政,化生史,化生地,化政史,化政地,化史地,生政史,生政地,生史地,政史地
    preference:
      max-schools: 10
      max-majors-per-school: 6
  volunteer:
    max-slots: 96
    auto-save-interval-seconds: 30
  prediction:
    cache-ttl-seconds: 3600
    batch-size: 50
  data-import:
    max-rows: 50000
    allowed-formats: xlsx,xls
